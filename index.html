<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unsplash Test</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .card { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
    .card img { width: 100%; height: 150px; object-fit: cover; }
    .card p { margin: 0; padding: 8px; font-size: 0.9rem; background: #f5f5f5; }
  </style>
</head>
<body>
  <h1>Unsplash Image Search</h1>
  <input type="text" id="search" placeholder="Enter search term" value="cyberpunk">
  <button onclick="search()">Search</button>
  <div class="gallery" id="gallery"></div>

  <script>
    const ACCESS_KEY = 'ntxElg9WFahbHrGfBbhxgRUuInAuHSi-6owgUKSjGlo'; // ← replace with your key

    async function search() {
      const query = document.getElementById('search').value;
      const url = `https://api.unsplash.com/search/photos?query=${encodeURIComponent(query)}&client_id=${ACCESS_KEY}&per_page=1&orientation=landscape`;
      
      try {
        const res = await fetch(url);
        const data = await res.json();
        renderGallery(data.results);
      } catch (err) {
        console.error(err);
        alert('Error fetching images');
      }
    }

    function renderGallery(images) {
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = images.map(img => `
        <div class="card">
          <a href="${img.links.html}" target="_blank">
            <img src="${img.urls.thumb}" alt="${img.alt_description || 'Image'}">
          </a>
          <p>by ${img.user.name}</p>
        </div>
      `).join('');
    }

    // Initial load
    search();
  </script>
</body>
</html>
